name: Release - Copy to S3 (Prod)

on:
  workflow_dispatch:
    inputs:
      version_number:
        required: true
        type: string
        description: 'The version being released. Eg. 7.11.0'

jobs:
  copy-to-s3:
    name: Copy ${{ inputs.version_number }} to S3 (Prod)
    runs-on: ubuntu-24.04
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@v1 # detects minimum permissions required to run the workflow, uncomment to use
      - name: Checkout Self
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        # This always checkouts main. So the script will be run from main.

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # pin@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEFAULT }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEFAULT }}
          aws-region: us-east-2

      - name: Run script
        env:
          RUNNING_ON_GHA: 'true'
        run: ./automation/release/copy-to-s3-prod.sh ${{ inputs.version_number }} default
