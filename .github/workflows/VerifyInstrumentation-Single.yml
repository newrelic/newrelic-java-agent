name: Verify Instrumentation (single)

# Permissions granted to all jobs in the workflow.
# Permissions that aren't explicitly defined here will default to a value of none.
permissions: {}

on:
  workflow_dispatch:
    inputs:
      module:
        required: true
        type: string
        description: 'The directory of the module to verify.'
      ref:
        required: true
        default: main
        type: string
        description: 'The ref (branch, SHA, tag?) to run the tests on'

jobs:
  verify-module:
    name: Verify Instrumentation (${{ github.event.inputs.module || inputs.module }})
    runs-on: ubuntu-24.04
    env:
      MODULE: ${{ github.event.inputs.module || inputs.module }}
      AWS_KEY: ${{ secrets.aws-secret-access-key }}
    steps:
#       - uses: GitHubSecurityLab/actions-permissions/monitor@v1 # detects minimum permissions required to run the workflow, uncomment to use
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Configure AWS Credentials
        if: ${{ env.AWS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # pin@v6
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: us-east-2

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Build agent
        run: ./gradlew $GRADLE_OPTIONS clean jar

      - name: Running verifyInstrumentation on (${{ env.MODULE }})
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: ./gradlew $GRADLE_OPTIONS :instrumentation:${{ env.MODULE }}:verifyInstrumentation
