name: Verify Unshadowed Jars
on:
  workflow_dispatch:
    inputs:
      agent-ref:
        required: true
        default: main
        type: string
        description: 'The ref (branch, SHA, tag?) to run the verification on'
  workflow_call:
    inputs:
      agent-ref:
        description: 'The ref (branch, SHA, tag?) to run the tests on'
        required: false
        default: 'main'
        type: string

jobs:
  verify-shadowed-jars:
    name: Verify Shadowed Jars
    runs-on: ubuntu-24.04
    env:
      AWS_KEY: ${{ secrets.aws-secret-access-key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          ref: ${{ inputs.agent-ref }}

      - name: Configure AWS Credentials
        if: ${{ env.AWS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # pin@v6
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: us-east-2

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Build agent
        run: ./gradlew $GRADLE_OPTIONS clean jar

      - name: Run script
        env:
          RUNNING_ON_GHA: 'true'
        run: ./automation/verify-unshadowed-jars.sh
