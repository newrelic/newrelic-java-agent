dependencies {
    implementation(project(":agent-bridge"))
    implementation("org.apache.camel:camel-kafka:3.22.0")
    implementation("org.apache.camel:camel-support:3.22.0")
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(11))
    }
}


jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.apache-camel-kafka-3.15.0',
            'Implementation-Title-Alias': 'apache-camel-kafka'  }
}

verifyInstrumentation {
    passesOnly 'org.apache.camel:camel-kafka:[3.15.0,4.4.0)'
    excludeRegex 'org.apache.camel:camel-kafka:3.21.(4|5)'
}