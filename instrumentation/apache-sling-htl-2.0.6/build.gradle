dependencies {
    implementation(project(":agent-bridge"))
    implementation("org.apache.sling:org.apache.sling.api:2.27.6")
    implementation('jakarta.servlet:jakarta.servlet-api:4.0.4')
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.apache-sling-htl-2.0.6',
            'Implementation-Title-Alias': 'apache-sling-htl'}
}

verifyInstrumentation {
    passesOnly ('jakarta.servlet:jakarta.servlet-api:[4.0.4,5.0.0-M1)') {
        excludeRegex('.*-M[0-9]')
        implementation("org.apache.sling:org.apache.sling.api:2.27.6")
    }

    passesOnly ('org.apache.sling:org.apache.sling.api:[2.0.6,3.0.0)') {
        implementation('jakarta.servlet:jakarta.servlet-api:4.0.4')
    }
}

site {
    title 'HTL'
    type 'Other'
}