dependencies {
    implementation(project(":agent-bridge"))
    implementation("org.apache.sling:org.apache.sling.api:3.0.0")
    implementation('jakarta.servlet:jakarta.servlet-api:5.0.0')
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.apache-sling-htl-3.0.0',
            'Implementation-Title-Alias': 'apache-sling-htl'}
}

verifyInstrumentation {
    passesOnly ('jakarta.servlet:jakarta.servlet-api:[5.0.0,)') {
        excludeRegex('.*-M[0-9]')
        implementation("org.apache.sling:org.apache.sling.api:3.0.0")
    }

    passesOnly ('org.apache.sling:org.apache.sling.api:[3.0.0,)') {
        implementation('jakarta.servlet:jakarta.servlet-api:5.0.0')
    }
}

site {
    title 'HTL'
    type 'Other'
}