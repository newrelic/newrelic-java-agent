jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.aws-lambda-java-core-1.2.0' }
}

dependencies {
    implementation(project(":agent-bridge"))
    implementation("com.amazonaws:aws-lambda-java-core:1.2.3")

    testImplementation("com.amazonaws:aws-lambda-java-events:3.11.0")

}

verifyInstrumentation {
    passesOnly('com.amazonaws:aws-lambda-java-core:[1.1.0,)')

    excludeRegex '.*.RC[0-9]'
    excludeRegex '.*.M[0-9]'
}

site {
    title 'AWS Lambda Core'
    type 'Framework'
}
