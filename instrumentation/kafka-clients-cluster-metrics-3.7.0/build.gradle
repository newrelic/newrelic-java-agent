
dependencies {
    implementation(project(":agent-bridge"))
    implementation("org.apache.kafka:kafka-clients:3.7.0")
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.kafka-clients-cluster-metrics-3.7.0',
            'Implementation-Title-Alias': 'kafka-clients-cluster-metrics' }
}

verifyInstrumentation {
    passesOnly 'org.apache.kafka:kafka-clients:[3.7.0,4.0.0)'
}

site {
    title 'Kafka Clients Cluster Metrics'
    type 'Kafka'
}
