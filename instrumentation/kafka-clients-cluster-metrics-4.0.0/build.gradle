
dependencies {
    implementation(project(":agent-bridge"))
    implementation("org.apache.kafka:kafka-clients:4.0.0")
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.kafka-clients-cluster-metrics-4.0.0',
            'Implementation-Title-Alias': 'kafka-clients-cluster-metrics' }
}

verifyInstrumentation {
    passesOnly 'org.apache.kafka:kafka-clients:[4.0.0,)'
}

site {
    title 'Kafka Clients Cluster Metrics'
    type 'Kafka'
}

// kafka-clients 4.0.0 is compiled with Java 11 (class file version 55).
// Use the JDK 17 toolchain to read those class files, and target Java 11 bytecode
// so the weave module loads on Java 11+ JVMs that run Kafka 4.0.
java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

compileJava {
    options.fork = true
    options.bootstrapClasspath = null
    options.release = 11
}
