import org.apache.tools.ant.taskdefs.Java

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.mcp-java-sdk-1.0.0' }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation(project(":agent-bridge"))
    implementation 'io.modelcontextprotocol.sdk:mcp:1.1.1'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'io.modelcontextprotocol.sdk:mcp:1.1.1'
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

test {
    onlyIf {
        !project.hasProperty('test8') && !project.hasProperty('test11')
    }
}

verifyInstrumentation {
    passes 'io.modelcontextprotocol.sdk:mcp:[1.0.0,)'
}

site {
    title 'MCP Java SDK'
    type 'AI'
}