// The various additions and changes to this build file (versus other module build files)
// are a result of an upgrade to gradle 8. Each new major version of gradle requires a
// re-creation of local cache metadata, even if the target artifact is already cached on the machine.
// The MuleSoft repo uses an SSL cert that is not trusted by the default Java 8 trust store,
// which causes SSL errors when gradle attempts to contact the repo to refresh the cache metadata.
// These changes are required to avoid contacting the mule soft repo for anything.

repositories {
    // The content closure restricts gradle from contacting the mulesoft repos for anything
    // other than mulesoft artifacts
    maven {
        url 'https://repository.mulesoft.org/releases/'
        content { includeGroupByRegex 'org\\.mule.*' }
    }
    maven {
        url 'https://repository.mulesoft.org/snapshots/'
        content { includeGroupByRegex 'org\\.mule.*' }
    }
    maven {
        url 'https://repository.mulesoft.org/nexus/content/repositories/public/'
        content { includeGroupByRegex 'org\\.mule.*' }
    }
}

configurations.all {
    resolutionStrategy.dependencySubstitution {
        // Mule's POMs declare many transitive dependencies as OSGi bundles
        // These bundles only exist on the mulesoft repo, so we intercept
        // the resolution flow and catch any artifact who's version ends in "-osgi"
        // and substitute it by stripping the "-osgi" string. This causes
        // gradle to search maven central for the base artifact, bypassing
        // mulesoft
        all { DependencySubstitution dependency ->
            if (dependency.requested.hasProperty('version')
                    && dependency.requested.version?.endsWith('-osgi')) {
                def v = dependency.requested.version - '-osgi'
                dependency.useTarget("${dependency.requested.group}:${dependency.requested.module}:${v}")
            }
        }
    }
    
    // All these dependencies exist solely on the mulesoft repo, but aren't required
    // for actually building this module, so we can exclude them.
    exclude group: 'org.mule.modules', module: 'mule-module-xml'
    exclude group: 'org.mule.mvel', module: 'mule-mvel2'
    exclude group: 'org.mule.common', module: 'mule-common'
    exclude group: 'org.mule.extensions', module: 'mule-extensions-api'
}

dependencies {
    implementation(project(":agent-bridge"))
    implementation(project(":newrelic-api"))
    implementation(project(":newrelic-weaver-api"))

    implementation("org.mule:mule-core:3.6.0")
    implementation("org.mule.modules:mule-module-http:3.6.0")
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.mule-3.6',
                'Implementation-Title-Alias': 'mule_instrumentation'
    }
}

verifyInstrumentation {
    passes('org.mule:mule-core:[3.6.0,3.7.0)') {
        implementation("org.mule.modules:mule-module-http:3.6.0")
    }

    // these versions cause problems getting artifacts
    exclude 'org.mule:mule-core:[0,3.4.0)'
    exclude 'org.mule:mule-core:3.5.4'
    exclude 'org.mule:mule-core:[3.6.2,3.7.0)'
    exclude 'org.mule:mule-core:[3.7.1,3.8.0)'
    exclude 'org.mule:mule-core:[3.8.2,)'

    excludeRegex 'org.mule:mule-core:.*-(EA|HF|RC|M|rc|bighorn|cascade).*[0-9]*.*'
}

site {
    title 'Mule'
    type 'Appserver'
}