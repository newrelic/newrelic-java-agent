dependencies {
    implementation(project(":agent-bridge"))
    implementation("io.netty:netty-all:4.0.37.Final")
}

jar {
    manifest {
        attributes 'Implementation-Title': 'com.newrelic.instrumentation.netty-4.0.37',
                'Implementation-Title-Alias': 'netty_instrumentation'
    }
}

// This module doesn't support HTTP/2
verifyInstrumentation {
    passesOnly 'io.netty:netty-all:[4.0.37.Final,4.1.16.Final)'
    excludeRegex '.*Beta[0-9]'
    excludeRegex '.*CR[0-9]'
}

site {
    title 'Netty'
    type 'Appserver'
}