plugins {
    id "org.jetbrains.kotlin.jvm"
}

dependencies {
    implementation(project(":agent-bridge"))
    implementation("io.quarkus:quarkus-resteasy:2.14.1.Final")
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.quarkus-resteasy-2.14.1',
            'Implementation-Title-Alias': 'quarkus'}
}

verifyInstrumentation {
    passesOnly 'io.quarkus:quarkus-resteasy:[2.14.1.Final,)'
    excludeRegex '.*CR[0-9]*'
    excludeRegex '.*Alpha[0-9]'
    excludeRegex '.*Beta[0-9]'

    // Excludes to reduce the verifier runtime...
    // Exclude all pre-range versions (0.x --> 2.14.0.Final)
    exclude 'io.quarkus:quarkus-resteasy:(,2.14.1.Final)'

    // Keep only last patch of each minor ver
    exclude 'io.quarkus:quarkus-resteasy:[2.14.1.Final,2.14.3.Final)'
    exclude 'io.quarkus:quarkus-resteasy:[2.15.0.Final,2.15.3.Final)'
    exclude 'io.quarkus:quarkus-resteasy:[2.16.0.Final,2.16.12.Final)'
    exclude 'io.quarkus:quarkus-resteasy:[3.0.0.Final,3.0.4.Final)'
    exclude 'io.quarkus:quarkus-resteasy:[3.1.0.Final,3.1.3.Final)'
    exclude 'io.quarkus:quarkus-resteasy:[3.2.0.Final,3.2.12.Final)'
    exclude 'io.quarkus:quarkus-resteasy:[3.3.0,3.3.3)'
    exclude 'io.quarkus:quarkus-resteasy:[3.4.0,3.4.3)'
    exclude 'io.quarkus:quarkus-resteasy:[3.5.0,3.5.3)'
    exclude 'io.quarkus:quarkus-resteasy:[3.6.0,3.6.9)'
    exclude 'io.quarkus:quarkus-resteasy:[3.7.0,3.7.4)'
    exclude 'io.quarkus:quarkus-resteasy:[3.8.0,3.8.6.1)'
    exclude 'io.quarkus:quarkus-resteasy:[3.9.0,3.9.5)'
    exclude 'io.quarkus:quarkus-resteasy:[3.10.0,3.10.2)'
    exclude 'io.quarkus:quarkus-resteasy:[3.11.0,3.11.3)'
    exclude 'io.quarkus:quarkus-resteasy:[3.12.0,3.12.3)'
    exclude 'io.quarkus:quarkus-resteasy:[3.13.0,3.13.3)'
    exclude 'io.quarkus:quarkus-resteasy:[3.14.0,3.14.4)'
    exclude 'io.quarkus:quarkus-resteasy:[3.15.0,3.15.5)'
    exclude 'io.quarkus:quarkus-resteasy:[3.16.0,3.16.4)'
    exclude 'io.quarkus:quarkus-resteasy:[3.17.0,3.17.8)'
    exclude 'io.quarkus:quarkus-resteasy:[3.18.0,3.18.4)'
    exclude 'io.quarkus:quarkus-resteasy:[3.19.0,3.19.4)'
    exclude 'io.quarkus:quarkus-resteasy:[3.20.0,3.20.1)'
    exclude 'io.quarkus:quarkus-resteasy:[3.21.0,3.21.4)'
    exclude 'io.quarkus:quarkus-resteasy:[3.22.0,3.22.3)'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

test {
    onlyIf {
        !project.hasProperty('test8') && !project.hasProperty('test11')
    }
}

site {
    title 'Quarkus'
    type 'Framework'
}