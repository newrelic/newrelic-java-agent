dependencies {
    implementation(project(":agent-bridge"))
    implementation('io.smallrye.reactive:mutiny:0.14.0')
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.smallrye-mutiny-0.14.0' }
}

verifyInstrumentation {
    passesOnly 'io.smallrye.reactive:mutiny:[1.0.0,)'
    excludeRegex '.*Alpha.*'
    excludeRegex '.*Beta.*'
    excludeRegex '.*RC.*'
    excludeRegex '.*milestone.*'
    excludeRegex '.*-M[0-9].*'

    // Ignore all 0.x.x versions
    excludeRegex 'io.smallrye.reactive:mutiny:0\\..*'


    // Keep only last patch of each minor ver to reduce verifier task size
    exclude 'io.smallrye.reactive:mutiny:[1.1.0,1.1.2)'
    exclude 'io.smallrye.reactive:mutiny:[1.3.0,1.3.1)'
    exclude 'io.smallrye.reactive:mutiny:[2.3.0,2.3.1)'
    exclude 'io.smallrye.reactive:mutiny:[2.5.0,2.5.8)'
    exclude 'io.smallrye.reactive:mutiny:[2.6.0,2.6.2)'
    // 2.7.0 and 2.8.0 are singletons — no excludes needed yet
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

test {
    // These instrumentation tests only run on Java 17+ regardless of the -PtestN gradle property that is set.
    onlyIf {
        !project.hasProperty('test8') && !project.hasProperty('test11')
    }
}

site {
    title 'Quarkus'
    type 'Framework'
}
