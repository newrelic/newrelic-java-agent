plugins {
    id "org.jetbrains.kotlin.jvm"
}

dependencies {
    implementation(project(":agent-bridge"))
    implementation("org.springframework:spring-context:4.0.0.RELEASE")
    implementation("org.springframework:spring-web:4.0.0.RELEASE")
    implementation("org.springframework:spring-webmvc:4.0.0.RELEASE")
    implementation('jakarta.servlet:jakarta.servlet-api:4.0.4')
    testImplementation("org.jetbrains.kotlin:kotlin-stdlib:1.8.21")
}

jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.spring-4.0.0',
            'Implementation-Title-Alias': 'spring_annotations' }
}

verifyInstrumentation {
    passesOnly('org.springframework:spring-web:[4.0.0.RELEASE,4.2.0.RC1)') {
        implementation('jakarta.servlet:jakarta.servlet-api:4.0.4')
        implementation("org.springframework:spring-webmvc:4.0.0.RELEASE")
    }

    excludeRegex 'org.springframework:spring-web:.*(RC|SEC|M)[0-9]*$'
}

site {
    title 'Spring'
    type 'Framework'
}