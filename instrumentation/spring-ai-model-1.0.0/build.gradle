jar {
    manifest { attributes 'Implementation-Title': 'com.newrelic.instrumentation.spring-ai-model-1.0.0', 'Implementation-Title-Alias': 'spring_ai' }
}

dependencies {
    implementation(project(":agent-bridge"))
    implementation 'org.springframework.ai:spring-ai-model:1.0.0' // compile against version 1.0.0 in final implementation

    testImplementation 'org.springframework.ai:spring-ai-model:1.0.0'
//    testImplementation 'org.mockito:mockito-inline:4.11.0'
//    testImplementation 'org.json:json:20240303'
}

verifyInstrumentation {
    passesOnly 'org.springframework.ai:spring-ai-model:[1.0.0,)'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(17))
    }
}

site {
    title 'Spring AI Embedding Model'
    type 'AI'
}
